<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Notes Mind Map</title>

    <!-- Markmap -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Mermaid for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
        }

        #mindmap-container {
            width: 65%;
            height: 100%;
            background: white;
            border-right: 1px solid #ddd;
        }

        #mindmap {
            width: 100%;
            height: 100%;
        }

        #content-panel {
            width: 35%;
            height: 100%;
            overflow-y: auto;
            padding: 24px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
        }

        #nav-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        #nav-bar button {
            width: 38px;
            height: 38px;
            border: 2px solid #4a90d9;
            border-radius: 6px;
            background: white;
            color: #4a90d9;
            font-size: 1.2em;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #nav-bar button:hover {
            background: #4a90d9;
            color: white;
        }

        #topic-selector {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            font-size: 1em;
            border: 2px solid #4a90d9;
            border-radius: 6px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        #topic-selector:hover {
            border-color: #2c5282;
        }

        #topic-selector:focus {
            outline: none;
            border-color: #2c5282;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
        }

        #content-panel h2 {
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a90d9;
            font-size: 1.4em;
        }

        #content-area {
            flex: 1;
            overflow-y: auto;
        }

        #content-panel .content {
            line-height: 1.7;
            color: #444;
        }

        #content-panel .content p {
            margin-bottom: 12px;
        }

        #content-panel .content ul {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        #content-panel .content li {
            margin-bottom: 8px;
        }

        #content-panel .placeholder {
            color: #888;
            font-style: italic;
            text-align: center;
            margin-top: 40%;
        }

        /* KaTeX styling */
        .katex-display {
            margin: 16px 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* Mermaid diagram styling */
        .mermaid {
            margin: 16px 0;
            text-align: center;
        }

        /* Tables */
        table {
            border-collapse: collapse;
            margin: 16px 0;
            width: 100%;
            font-size: 0.95em;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background: #4a90d9;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background: #f0f4fa;
        }

        /* Code blocks */
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }

        /* Bold text */
        strong {
            color: #2c5282;
        }

        /* Tag pills */
        .tag {
            display: inline-block;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 4px;
            vertical-align: middle;
        }
        .tag-definition { background: #dbeafe; color: #1e40af; }
        .tag-theorem    { background: #fce7f3; color: #9d174d; }
        .tag-proof      { background: #ede9fe; color: #5b21b6; }
        .tag-formula    { background: #fef3c7; color: #92400e; }
        .tag-fact       { background: #d1fae5; color: #065f46; }
        .tag-example    { background: #ffedd5; color: #9a3412; }
        .tag-algorithm  { background: #e0e7ff; color: #3730a3; }
        .tag-intuition  { background: #f0fdfa; color: #115e59; }

        /* Markmap node styling */
        .markmap-node text {
            cursor: pointer;
        }

        .markmap-node:hover text {
            fill: #4a90d9;
        }

    </style>
</head>
<body>

        <svg id="mindmap"></svg>

    <div id="content-panel">
        <div id="nav-bar">
            <button id="prev-btn" title="Previous topic">&uarr;</button>

                <option value="">-- Select a topic --</option>
            </select>
            <button id="next-btn" title="Next topic">&darr;</button>
        </div>
        <div id="content-area">
            <h2 id="content-title">Notes</h2>
            <div id="content-body" class="content">
                <p class="placeholder">Select a topic from the dropdown above to view its content.</p>
            </div>

    </div>

    <script>
        // Content data
        const contentMap = {
  "Projection/Camera Models/Orthographic/Draw and label a diagram of orthographic projection.": "**Q:** Draw and label a diagram of orthographic projection.",
  "Projection/Camera Models/Orthographic/State the orthographic projection mapping.": "**Q:** State the orthographic projection mapping.\n\n$$\\mathbf{x} = \\mathbf{X} - (\\mathbf{X} \\cdot \\mathbf{k})\\mathbf{k} = (\\mathbf{k} \\times \\mathbf{X}) \\times \\mathbf{k}$$\n\n- When the optical axis is aligned with $Z$: $(x, y) = (X, Y)$ — simply drop the depth coordinate",
  "Projection/Camera Models/Orthographic/What are the assumptions of orthographic projection?": "**Q:** What are the assumptions of orthographic projection?\n\n- Projection rays are parallel (equivalent to the camera being infinitely far from the scene, or the scene having negligible depth variation)\n- No perspective foreshortening — objects do not appear smaller with increasing distance from the camera",
  "Projection/Camera Models/Orthographic/What are the problems with orthographic projection?": "**Q:** What are the problems with orthographic projection?\n\n- Does not explain the convergence of parallel lines observed in real CCD camera images (e.g. railway tracks, buildings)",
  "Projection/Camera Models/Perspective/Draw and label a diagram of perspective (pin-hole camera) projection.": "**Q:** Draw and label a diagram of perspective (pin-hole camera) projection.",
  "Projection/Camera Models/Perspective/State the perspective projection.": "**Q:** State the perspective projection.\n\n$$u=u_0 + \\frac{k_ufX_c}{Z_c}=u_0+\\frac{k_uf(r_{11}X+r_{12}Y+r_{13}Z+T_x)}{r_{31}X+r_{32}Y+r_{33}Z+T_z}$$\n\n$$v=v_0 + \\frac{k_vfY_c}{Z_c}=v_0+\\frac{k_vf(r_{21}X+r_{22}Y+r_{23}Z+T_y)}{r_{31}X+r_{32}Y+r_{33}Z+T_z}$$",
  "Projection/Camera Models/Perspective/What are the assumptions of the perspective projection model?": "**Q:** What are the assumptions of the perspective projection model?\n\n- Pin-hole camera (= planar perspective projection) — projecting through a single point onto a flat image plane\n- No nonlinear distortion — no radial lens distortion or other aberrations that cause deviations from the ideal pin-hole model (a real-lens constraint)\n- Together these ensure a line in the world projects to a line in the image",
  "Projection/Camera Models/Perspective/Derive the perspective projection, identifying all internal and external came...": "**Q:** Derive the perspective projection, identifying all internal and external camera parameters.\n\n- Rigid body motion\n\n$$\\mathbf{X}_c=\\mathbf{R}\\mathbf{X}+\\mathbf{T}$$\n$$\\tilde{\\mathbf{X}}_c = \\begin{bmatrix} \\mathbf{R} & \\mathbf{T} \\\\ 0\\ 0\\ 0 & 1 \\end{bmatrix} \\tilde{\\mathbf{X}}$$\n\n- Projection (similar triangles)\n\n$$x=\\frac{fX_c}{Z_c}$$\n$$y=\\frac{fY_c}{Z_c}$$\n\n$$\\begin{bmatrix} sx \\\\ sy \\\\ s \\end{bmatrix} = \\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 1 & 0 \\end{bmatrix} \\begin{bmatrix} X_c \\\\ Y_c \\\\ Z_c \\\\ 1 \\end{bmatrix}$$\n\n- **CCD imaging** (image plane to pixel coordinates):\n\n$$u=u_0 + k_ux $$\n$$v=v_0+k_vy $$\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix} \\begin{bmatrix} sx \\\\ sy \\\\ s \\end{bmatrix}$$\n\n- **Overall**: $\\tilde{\\mathbf{w}} = \\mathbf{K}[\\mathbf{R} | \\mathbf{T}]\\tilde{\\mathbf{X}}$ where $\\mathbf{P} = \\mathbf{K}[\\mathbf{R} | \\mathbf{T}]$ is the $3 \\times 4$ projection matrix\n- **Internal parameters**\n  - $f$ (focal length)\n  - $(u_0, v_0)$ (principal point)\n  - $k_u, k_v$ (pixels per unit length)\n- **External parameters**: \n  - $\\mathbf{R}$ (orientation, 3 DoF)\n  - $\\mathbf{T}$ (position, 3 DoF)",
  "Projection/Camera Models/Perspective/3D-2D": "- 4 internal dof: $f$, $k_u$, $k_v$, $u_0$, $v_0$\n- 6 external dof: $\\mathbf{R}$ (3 DoF) + $\\mathbf{T}$\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 1 & 0 \\end{bmatrix}\\begin{bmatrix} r_{11} & r_{12} & r_{13} & T_x \\\\ r_{21} & r_{22} & r_{23} & T_y \\\\ r_{31} & r_{32} & r_{33} & T_z \\\\ 0 & 0 & 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ Z \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Perspective/2D-2D": "$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 1 & 0 \\end{bmatrix}\\begin{bmatrix} r_{11} & r_{12} & T_x \\\\ r_{21} & r_{22} & T_y \\\\ r_{31} & r_{32} & T_z \\\\ 0 & 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Perspective/1D-1D": "$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 1 & 0 \\end{bmatrix}\\begin{bmatrix} r_{11} & T_x \\\\ r_{21} & T_y \\\\ r_{31} & T_z \\\\ 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Projective/Why is the projective extension of the perspective model needed?": "**Q:** Why is the projective extension of the perspective model needed?\n\n- The perspective model decomposes $\\mathbf{P} = \\mathbf{K}[\\mathbf{R}|\\mathbf{T}]$, tying the matrix to physical camera parameters (10 DoF)\n- The projective model treats $\\mathbf{P}$ as a **general $3 \\times 4$ matrix** with no assumed structure (11 DoF)\n- This allows calibrating $\\mathbf{P}$ directly (11 unknowns, 6 points) without knowing $\\mathbf{K}$, $\\mathbf{R}$, $\\mathbf{T}$ separately",
  "Projection/Camera Models/Projective/3D-2D": "- 11 dof\n- 6 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} & p_{14} \\\\ p_{21} & p_{22} & p_{23} & p_{24} \\\\ p_{31} & p_{32} & p_{33} & p_{34} \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ Z \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Projective/2D-2D": "- 8 dof\n- 4 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ p_{31} & p_{32} & p_{33} \\\\ \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Projective/1D-1D": "- 5 dof\n- 3 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} \\\\ p_{21} & p_{22} \\\\ p_{31} & p_{32} \\end{bmatrix} \\begin{bmatrix} X \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Weak Perspective/Draw and label a diagram of weak perspective projection.": "**Q:** Draw and label a diagram of weak perspective projection.",
  "Projection/Camera Models/Weak Perspective/State the weak perspective projection mapping.": "**Q:** State the weak perspective projection mapping.\n\n$$u=u_0 + \\frac{k_ufX_c}{Z_{av}}=u_0+\\frac{k_uf(r_{11}X+r_{12}Y+r_{13}Z+T_x)}{Z_{av}}$$\n\n$$v=v_0 + \\frac{k_vfY_c}{Z_{av}}=v_0+\\frac{k_vf(r_{21}X+r_{22}Y+r_{23}Z+T_y)}{Z_{av}}$$",
  "Projection/Camera Models/Weak Perspective/Under what viewing conditions is weak perspective a good camera model?": "**Q:** Under what viewing conditions is weak perspective a good camera model?\n\n- The depth range $\\Delta Z$ of objects in the scene is small compared with the viewing distance $Z_A$ (i.e. $\\frac{\\Delta Z}{Z_A} \\ll 1$)\n- Rule of thumb: viewing distance should be at least 10 times the depth range",
  "Projection/Camera Models/Weak Perspective/What are the advantages of the weak perspective camera model?": "**Q:** What are the advantages of the weak perspective camera model?\n\n- Projection equations become **linear** — $u_i = p_{11}X_i + p_{12}Y_i + p_{13}Z_i + p_{14}$\n- Easier to calibrate (fewer points needed — only 4 points)\n- Calibration is better conditioned (less sensitive to noise) since it uses linear least squares rather than nonlinear optimisation",
  "Projection/Camera Models/Weak Perspective/Derive the weak perspective projection matrix.": "**Q:** Derive the weak perspective projection matrix.\n\n- Under weak perspective, assume all points lie at approximately the same depth $Z_A$ from the camera\n\n- The projection matrix becomes:\n\n$$\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 1 & 0 \\end{bmatrix} \\to \\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 0 & Z_A \\end{bmatrix}$$\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u f & 0 & 0 & u_0 Z_A \\\\ 0 & k_v f & 0 & v_0 Z_A \\\\ 0 & 0 & 0 & Z_A \\end{bmatrix} \\begin{bmatrix} X_c \\\\ Y_c \\\\ Z_c \\\\ 1 \\end{bmatrix}$$\n\n- Since $s$ is constant, the bottom row is $(0, 0, 0, p_{34})$, giving a **linear** relationship:\n\n$$\\begin{bmatrix} u \\\\ v \\end{bmatrix} = [2 \\times 4] \\begin{bmatrix} X \\\\ Y \\\\ Z \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Weak Perspective/Derive the error introduced by the weak perspective approximation.": "**Q:** Derive the error introduced by the weak perspective approximation.\n\n- Under full perspective: $u = \\frac{k_u f X_c + u_0 Z_c}{Z_c}$\n- Under weak perspective: $u_A = \\frac{k_u f X_c + u_0 Z_A}{Z_A}$\n- The error is:\n\n$$u - u_A = (u - u_0)\\frac{\\Delta Z}{Z_A}$$\n\n$$v - v_A = (v - v_0)\\frac{\\Delta Z}{Z_A}$$\n\nwhere $\\Delta Z \\equiv Z_A - Z_c$\n\n- The approximation is **perfect at the image centre** $(u_0, v_0)$ but gets progressively worse away from the centre",
  "Projection/Camera Models/Weak Perspective/3D-2D": "$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 0 & Z_A \\end{bmatrix}\\begin{bmatrix} r_{11} & r_{12} & r_{13} & T_x \\\\ r_{21} & r_{22} & r_{23} & T_y \\\\ r_{31} & r_{32} & r_{33} & T_z \\\\ 0 & 0 & 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ Z \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Weak Perspective/2D-2D": "$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 0 & Z_A \\end{bmatrix}\\begin{bmatrix} r_{11} & r_{12} & T_x \\\\ r_{21} & r_{22} & T_y \\\\ r_{31} & r_{32} & T_z \\\\ 0 & 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Weak Perspective/1D-1D": "$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} k_u & 0 & u_0 \\\\ 0 & k_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}\\begin{bmatrix} f & 0 & 0 & 0 \\\\ 0 & f & 0 & 0 \\\\ 0 & 0 & 0 & Z_A \\end{bmatrix}\\begin{bmatrix} r_{11} & T_x \\\\ r_{21} & T_y \\\\ r_{31} & T_z \\\\ 0 & 1 \\end{bmatrix} \\begin{bmatrix} X \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Affine/3D-2D": "- 8 dof\n- 4 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} & p_{14} \\\\ p_{21} & p_{22} & p_{23} & p_{24} \\\\ 0 & 0 & 0 & p_{34} \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ Z \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Affine/2D-2D": "- 6 dof\n- 3 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ 0 & 0 & p_{33} \\\\ \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$",
  "Projection/Camera Models/Affine/1D-1D": "- 4 dof\n- 2 points to calibrate\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} \\\\ p_{21} & p_{22} \\\\ 0 & p_{32} \\end{bmatrix} \\begin{bmatrix} X \\\\ 1 \\end{bmatrix}$$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Point/How are 2D points represented in homogeneous coordinates? How are points at i...": "**Q:** How are 2D points represented in homogeneous coordinates? How are points at infinity represented?\n\n- A Cartesian point $(x, y)$ is represented as $\\tilde{\\mathbf{x}} = (x_1, x_2, x_3)^T = (sx, sy, s)^T$ where $s \\neq 0$\n- Convert back to Cartesian: $x = x_1/x_3$, $y = x_2/x_3$\n- **Points at infinity**: $x_3 = 0$, i.e. $(x_1, x_2, 0)^T$ with $x_1 \\neq 0$ or $x_2 \\neq 0$\n- $(0, 0, 0)^T$ is undefined",
  "Projection/Homogeneous Coordinates/Definition (2D)/Line/How are lines and the line at infinity represented in homogeneous coordinates?": "**Q:** How are lines and the line at infinity represented in homogeneous coordinates?\n\n- A line $ax + by + c = 0$ is represented as $\\mathbf{l} = (a, b, c)^T$\n- A point $\\tilde{\\mathbf{x}}$ lies on line $\\mathbf{l}$ iff $\\mathbf{l}^T\\tilde{\\mathbf{x}} = 0$\n- **Line at infinity**: $\\mathbf{l} = (0, 0, c)^T$ where $c \\neq 0$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Line/How are conics represented in homogeneous coordinates?": "**Q:** How are conics represented in homogeneous coordinates?\n\n- A conic $ax^2 + bxy + cy^2 + dx + ey + f = 0$ is represented as $\\tilde{\\mathbf{x}}^T C \\tilde{\\mathbf{x}} = 0$ where:\n\n$$C = \\begin{bmatrix} a & b/2 & d/2 \\\\ b/2 & c & e/2 \\\\ d/2 & e/2 & f \\end{bmatrix}$$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Operations/How do you find the intersection point of two lines in homogeneous coordinates?": "**Q:** How do you find the intersection point of two lines in homogeneous coordinates?\n\n$$\\tilde{\\mathbf{x}} = \\mathbf{l}_1 \\times \\mathbf{l}_2$$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Operations/How do you find the line through two points in homogeneous coordinates?": "**Q:** How do you find the line through two points in homogeneous coordinates?\n\n$$\\mathbf{l} = \\tilde{\\mathbf{x}}_1 \\times \\tilde{\\mathbf{x}}_2$$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Operations/How do you test if three points are collinear, or three lines are concurrent?": "**Q:** How do you test if three points are collinear, or three lines are concurrent?\n\n- **Collinearity**: $\\det[\\tilde{\\mathbf{x}}_1 \\quad \\tilde{\\mathbf{x}}_2 \\quad \\tilde{\\mathbf{x}}_3] = 0$\n- **Concurrency**: $\\det[\\mathbf{l}_1 \\quad \\mathbf{l}_2 \\quad \\mathbf{l}_3] = 0$",
  "Projection/Homogeneous Coordinates/Definition (2D)/Operations/How do points, lines, and conics transform under a homography H?": "**Q:** How do points, lines, and conics transform under a homography $H$?\n\n- **Point**: $\\tilde{\\mathbf{x}}' = H\\tilde{\\mathbf{x}}$\n- **Line**: $\\mathbf{l}' = H^{-T}\\mathbf{l}$\n  - Derivation: $\\mathbf{l}^T\\tilde{\\mathbf{x}} = 0 \\Rightarrow \\mathbf{l}^T H^{-1}\\tilde{\\mathbf{x}}' = 0 \\Rightarrow (H^{-T}\\mathbf{l})^T\\tilde{\\mathbf{x}}' = 0$\n- **Conic**: $C' = H^{-T} C H^{-1}$",
  "Projection/Homogeneous Coordinates/Definition (3D)/Point/How are 3D points represented in homogeneous coordinates? How are points at i...": "**Q:** How are 3D points represented in homogeneous coordinates? How are points at infinity represented?\n\n- A Cartesian point $(X, Y, Z)$ is represented as $\\tilde{\\mathbf{X}} = (X_1, X_2, X_3, X_4)^T = (\\lambda X, \\lambda Y, \\lambda Z, \\lambda)^T$ where $\\lambda \\neq 0$\n- Convert back: $X = X_1/X_4$, $Y = X_2/X_4$, $Z = X_3/X_4$\n- **Points at infinity**: $X_4 = 0$, i.e. $(X_1, X_2, X_3, 0)^T$ — represents a direction, not a position\n- $(0, 0, 0, 0)^T$ is undefined",
  "Projection/Homogeneous Coordinates/Definition (3D)/Plane/How are planes and the plane at infinity represented in homogeneous coordinates?": "**Q:** How are planes and the plane at infinity represented in homogeneous coordinates?\n\n- A plane $aX + bY + cZ = d$ is represented as $\\Pi = (a, b, c, -d)^T$\n- A point $\\tilde{\\mathbf{X}}$ lies on plane $\\Pi$ iff $\\Pi^T\\tilde{\\mathbf{X}} = 0$\n- **Plane at infinity**: $\\Pi = (0, 0, 0, d)^T$ where $d \\neq 0$",
  "Projection/Homogeneous Coordinates/Vanishing Points/Using the projection matrix, give expressions for the vanishing point of a li...": "**Q:** Using the projection matrix, give expressions for the vanishing point of a line with direction $(b_1, b_2, b_3)$.\n\n$$u_\\infty = \\frac{p_{11}b_1 + p_{12}b_2 + p_{13}b_3}{p_{31}b_1 + p_{32}b_2 + p_{33}b_3}$$\n\n$$v_\\infty = \\frac{p_{21}b_1 + p_{22}b_2 + p_{23}b_3}{p_{31}b_1 + p_{32}b_2 + p_{33}b_3}$$\n\n- All lines with the same direction $\\mathbf{b}$ share the same vanishing point, independent of position $\\mathbf{a}$",
  "Projection/Homogeneous Coordinates/Vanishing Points/Derive the equation of the vanishing line (horizon) of a plane with normal n ...": "**Q:** Derive the equation of the vanishing line (horizon) of a plane with normal $\\mathbf{n} = (n_x, n_y, n_z)$.\n\n- Consider a plane $\\mathbf{X}_c \\cdot \\mathbf{n} = d$\n- Using perspective projection: $\\begin{bmatrix} x \\\\ y \\\\ f \\end{bmatrix} = \\frac{f\\mathbf{X}_c}{Z_c}$\n- Taking the scalar product with $\\mathbf{n}$:\n\n$$\\begin{bmatrix} x \\\\ y \\\\ f \\end{bmatrix} \\cdot \\begin{bmatrix} n_x \\\\ n_y \\\\ n_z \\end{bmatrix} = \\frac{fd}{Z_c}$$\n\n- As $Z_c \\to \\infty$, the right side vanishes, giving the horizon line equation:\n\n$$n_x x + n_y y + f n_z = 0$$\n\n- The horizon depends **only on the orientation** of the plane (via $\\mathbf{n}$), not its position — so parallel planes share the same horizon line\n- **Ground plane special case** ($\\mathbf{n} = (0, 0, 1)$): find $VP_X$ and $VP_Y$ by projecting points at infinity along $X$ and $Y$ directions, then $\\mathbf{l} = VP_X \\times VP_Y$",
  "Projection/Homogeneous Coordinates/Vanishing Points/Why are vertical lines in Renaissance paintings usually drawn without vanishi...": "**Q:** Why are vertical lines in Renaissance paintings usually drawn without vanishing points?\n\n- Renaissance artists generally restricted themselves to projections onto **vertical planes** (since pictures hung on walls)\n- Vertical lines in the world are therefore **parallel to the image plane** ($b_z = 0$), so their vanishing point is at infinity — they appear parallel in the image\n- However, Renaissance artists understood perspective theory well and would introduce vanishing points for vertical lines when painting **ceiling frescos**, to create the illusion of depth above",
  "Projection/Plane Transformations/Projective (Homography) — 8 DoF": "- **DoF breakdown**: \n  - translation (2)\n  - rotation (1)\n  - uniform scale (1)\n  - shear axis & magnitude (2)\n  - fanning/perspective (2, specifying horizon line position)\n- **Matrix**:\n\n$$\\begin{bmatrix} su \\\\ sv \\\\ s \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ p_{31} & p_{32} & p_{33} \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$\n\n- **Distortion**: square → arbitrary quadrilateral (parallel lines gain vanishing points)\n- **Invariants**:\n  - incidence (collinearity)\n  - cross-ratio",
  "Projection/Plane Transformations/Affine — 6 DoF": "- **DoF breakdown**:\n  - translation (2)\n  - rotation (1)\n  - uniform scale (1)\n  - shear axis & magnitude (2)\n- **Matrix**:\n\n$$\\begin{bmatrix} u \\\\ v \\end{bmatrix} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$\n\n- **Distortion**: square → parallelogram\n- **Invariants**:\n  - all of projective, plus:\n  - parallelism\n  - length ratios along parallel lines\n  - centroids",
  "Projection/Plane Transformations/Similarity — 4 DoF": "- **DoF breakdown**:\n  - translation (2)\n  - rotation (1)\n  - uniform scale (1)\n- **Matrix**:\n\n$$\\begin{bmatrix} u \\\\ v \\end{bmatrix} = \\begin{bmatrix} s\\cos\\theta & -s\\sin\\theta & t_x \\\\ s\\sin\\theta & s\\cos\\theta & t_y \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$\n\n- **Distortion**: square → scaled, rotated, translated square\n- **Invariants**:\n  - all of affine, plus:\n  - angles\n  - length ratios (not just along parallel lines)\n  - bilateral symmetry",
  "Projection/Plane Transformations/Euclidean — 3 DoF": "- **DoF breakdown**:\n  - translation (2)\n  - rotation (1)\n- **Matrix**:\n\n$$\\begin{bmatrix} u \\\\ v \\end{bmatrix} = \\begin{bmatrix} \\cos\\theta & -\\sin\\theta & t_x \\\\ \\sin\\theta & \\cos\\theta & t_y \\end{bmatrix} \\begin{bmatrix} X \\\\ Y \\\\ 1 \\end{bmatrix}$$\n\n- **Distortion**: square → rotated, translated square (same size)\n- **Invariants**:\n  - all of similarity, plus:\n  - lengths (not just ratios)",
  "Projection/Calibration/Calibration Methods/3D-2D/Derive the calibration equations for estimating the projection matrix from kn...": "**Q:** Derive the calibration equations for estimating the projection matrix from known 3D reference points.\n\n- Use RANSAC to remove outliers before calibration\n- Starting from the projection equations:\n\n$$u_i = \\frac{p_{11}X_i + p_{12}Y_i + p_{13}Z_i + p_{14}}{p_{31}X_i + p_{32}Y_i + p_{33}Z_i + p_{34}}$$\n\n$$v_i = \\frac{p_{21}X_i + p_{22}Y_i + p_{23}Z_i + p_{24}}{p_{31}X_i + p_{32}Y_i + p_{33}Z_i + p_{34}}$$\n\n- Rearrange to be linear in the unknown $p_{ij}$:\n\n$$\\begin{bmatrix} X_i & Y_i & Z_i & 1 & 0 & 0 & 0 & 0 & -u_iX_i & -u_iY_i & -u_iZ_i & -u_i \\\\ 0 & 0 & 0 & 0 & X_i & Y_i & Z_i & 1 & -v_iX_i & -v_iY_i & -v_iZ_i & -v_i \\end{bmatrix} \\begin{bmatrix} p_{11} \\\\ p_{12} \\\\ p_{13} \\\\ p_{14} \\\\ p_{21} \\\\ p_{22} \\\\ p_{23} \\\\ p_{24} \\\\ p_{31} \\\\ p_{32} \\\\ p_{33} \\\\ p_{34} \\end{bmatrix} = \\mathbf{0}$$\n\n- Each point gives 2 equations in the 12 unknowns (11 DoF up to scale — fix by setting $|\\mathbf{p}| = 1$ or $p_{34} = 1$)\n- Need $\\geq 6$ points. Stack into $2N \\times 12$ matrix: $A\\mathbf{p} \\simeq \\mathbf{0}$\n- **Linear solution**: find eigenvector of $A^TA$ with smallest eigenvalue (SVD)\n- **Nonlinear refinement**: use linear solution to initialise gradient descent minimising reprojection error:\n\n$$\\min_{p_{ij}} \\sum_i (u_i - \\hat{u}_i)^2 + (v_i - \\hat{v}_i)^2$$",
  "Projection/Calibration/Calibration Methods/2D-2D/How is the 2D projective transformation (homography) calibrated?": "**Q:** How is the 2D projective transformation (homography) calibrated?\n\n- Setting $Z = 0$ gives a $3 \\times 3$ matrix with 8 DoF (9 elements minus scale)\n- Each correspondence gives 2 equations → need $\\geq 4$ points\n- Same method: assemble $A\\mathbf{p} = \\mathbf{0}$, solve by SVD\n- Optionally refine with nonlinear optimisation",
  "Projection/Calibration/Calibration Methods/1D-2D/How is a camera calibrated for observing a 1D structure (e.g. points along a ...": "**Q:** How is a camera calibrated for observing a 1D structure (e.g. points along a line)?\n\n- The mapping is a $3 \\times 2$ matrix with 5 DoF\n- Each point gives 2 equations → need $\\geq 3$ points\n- Same method: assemble $A\\mathbf{p} = \\mathbf{0}$, solve by SVD\n- Optionally refine with nonlinear optimisation",
  "Projection/Calibration/Recover World Position/1D/Given u, determine the position of a point on the line using the calibrated p...": "**Q:** Given $u$, determine the position of a point on the line using the calibrated projection matrix.\n\n$$\\begin{bmatrix} su \\\\ s \\end{bmatrix}=\\begin{bmatrix} p_{11} & p_{12} \\\\ p_{31} & p_{32} \\end{bmatrix}\\begin{bmatrix} X \\\\ 1 \\end{bmatrix}$$\n\n$$u=\\frac{su}{s}=\\frac{p_{11}X+p_{12}}{p_{31}X+p_{32}}$$\n\n$$X=\\frac{p_{32}X-p_{12}}{-p_{31}u+p_{11}}$$",
  "Projection/Calibration/Recover World Position/2D/Given u and v, determine the position of a point on the plane using the calib...": "**Q:** Given $u$ and $v$, determine the position of a point on the plane using the calibrated projection matrix.\n\n$$\\begin{bmatrix} u \\\\ v \\\\ 1 \\end{bmatrix}=\\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ p_{31} & p_{32} & p_{33} \\end{bmatrix}\\begin{bmatrix} \\lambda X \\\\ \\lambda Y \\\\ \\lambda \\end{bmatrix}$$\n\n$$\\begin{bmatrix} \\lambda X \\\\ \\lambda Y \\\\ \\lambda \\end{bmatrix}=\\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ p_{31} & p_{32} & p_{33} \\end{bmatrix}^{-1}\\begin{bmatrix} u \\\\ v \\\\ 1 \\end{bmatrix}$$",
  "Projection/Calibration/Recover World Position/3D/For a calibrated camera, show how a measured image point (u, v) defines a ray...": "**Q:** For a calibrated camera, show how a measured image point $(u, v)$ defines a ray in 3D space.\n\n$$u= \\frac{su}{s}=\\frac{p_{11}X+p_{12}Y+p_{13}Z+p_{14}}{p_{31}X+p_{32}Y+p_{33}Z+p_{34}}$$\n\n$$v= \\frac{sv}{s}=\\frac{p_{21}X+p_{22}Y+p_{23}Z+p_{24}}{p_{31}X+p_{32}Y+p_{33}Z+p_{34}}$$\n\n- Rearrange the projection equations to be linear in $(X, Y, Z)$:\n\n$$\\text{Plane 1:} \\quad (p_{11} - up_{31})X + (p_{12} - up_{32})Y + (p_{13} - up_{33})Z + (p_{14} - up_{34}) = 0$$\n\n$$\\text{Plane 2:} \\quad (p_{21} - vp_{31})X + (p_{22} - vp_{32})Y + (p_{23} - vp_{33})Z + (p_{24} - vp_{34}) = 0$$\n\n- These two planes are **not parallel** and their intersection defines a **ray** through the optical centre and the image point\n- A single image point gives a ray, not a point — to recover 3D position you need:\n  - **Triangulation** from two or more views, or\n  - At least **3 point correspondences** with known 3D positions (for pose)",
  "Projection/Calibration/Practical Considerations/Why are more correspondences preferred than the minimum?": "**Q:** Why are more correspondences preferred than the minimum?\n\n- Measurements are noisy — more points improve robustness via least squares\n- The linear solution is only approximate — more data enables better nonlinear refinement",
  "Projection/Calibration/Practical Considerations/Why is nonlinear optimisation needed when the calibration equations are linea...": "**Q:** Why is nonlinear optimisation needed when the calibration equations are linear in $p_{ij}$?\n\n- SVD minimises the **algebraic error** $|A\\mathbf{p}|$, which is not the same as the **reprojection error** $(u_i - \\hat{u}_i)^2 + (v_i - \\hat{v}_i)^2$\n- The reprojection error is nonlinear in $p_{ij}$ because of the division by $p_{31}X + p_{32}Y + p_{33}Z + p_{34}$\n- For **weak perspective**, the mapping is truly linear (no division), so linear least squares is optimal and no nonlinear refinement is needed",
  "Projection/Calibration/Practical Considerations/Describe desirable properties of the calibration object.": "**Q:** Describe desirable properties of the calibration object.\n\n- Reference points must span a **3D volume** — they must **not** be coplanar (otherwise one column of $\\mathbf{P}$ is not constrained and the system is degenerate)\n- Points should span different depths and cover a large field of view\n- Should allow precise localisation of reference points (e.g. corners of a calibration pattern)\n- Using a table of adjustable height exercises all degrees of freedom",
  "Projection/Calibration/Practical Considerations/Show how to recover the camera position, orientation, and focal length from t...": "**Q:** Show how to recover the camera position, orientation, and focal length from the projection matrix.\n\n- We know $\\mathbf{P} = \\mathbf{K}[\\mathbf{R} | \\mathbf{T}] = [\\mathbf{K}\\mathbf{R} | \\mathbf{K}\\mathbf{T}]$, so:\n\n$$\\begin{bmatrix} p_{11} & p_{12} & p_{13} & p_{14} \\\\ p_{21} & p_{22} & p_{23} & p_{24} \\\\ p_{31} & p_{32} & p_{33} & p_{34} \\end{bmatrix} = \\begin{bmatrix} & \\mathbf{K}\\mathbf{R} & & \\mathbf{K}\\mathbf{T} \\end{bmatrix}$$\n\n- Extract the left $3 \\times 3$ sub-matrix $\\mathbf{M} = \\mathbf{K}\\mathbf{R} = \\begin{bmatrix} p_{11} & p_{12} & p_{13} \\\\ p_{21} & p_{22} & p_{23} \\\\ p_{31} & p_{32} & p_{33} \\end{bmatrix}$\n- **RQ decompose** $\\mathbf{M}$ into $\\mathbf{K}$ (upper triangular) $\\times$ $\\mathbf{R}$ (orthogonal) — this separates the intrinsic and extrinsic parameters\n- Recover position from the last column:\n$$\\mathbf{T} = \\mathbf{K}^{-1} \\begin{bmatrix} p_{14} \\\\ p_{24} \\\\ p_{34} \\end{bmatrix}$$\n- Read off parameters from $\\mathbf{K} = \\begin{bmatrix} fk_u & 0 & u_0 \\\\ 0 & fk_v & v_0 \\\\ 0 & 0 & 1 \\end{bmatrix}$:\n  - $fk_u = K_{11}$, $fk_v = K_{22}$ — cannot decouple $f$ from $k_u, k_v$\n  - $(u_0, v_0) = (K_{13}, K_{23})$ — principal point\n  - $\\mathbf{R}$ — camera orientation (3 DoF)\n  - $\\mathbf{T}$ — camera position (3 DoF)",
  "Projection/Calibration/Practical Considerations/What is the significance of nonlinear distortion on calibration?": "**Q:** What is the significance of nonlinear distortion on calibration?\n\n- Nonlinear distortion (e.g. radial lens distortion) is **not included** in the projective camera model\n- Any residuals remaining after least squares calibration are partly due to nonlinear distortion, as well as errors in localising corners in the image and world"
};

            }
            // Wrap: return first option with a value
            for (let i = 0; i < selector.options.length; i++) {
                if (selector.options[i].value) return i;

        function prevOptionIndex(current) {

                if (selector.options[i].value) return i;

            });

            // Style [Fact], [Definition], etc. tags as coloured pills
            html = html.replace(/\[(Definition|Theorem|Proof|Formula|Fact|Example|Algorithm|Intuition)\]/g,
                (match, tag) => `<span class="tag tag-${tag.toLowerCase()}">${tag}</span>`);

            // Convert paragraphs (consecutive non-empty lines)
            html = html.replace(/\n\n+/g, '</p><p>');
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }

            return html;
        }

        function renderMath() {
            renderMathInElement(document.getElementById('content-body'), {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\[', right: '\\]', display: true},
                    {left: '\\(', right: '\\)', display: false}
                ],
                throwOnError: false
            });
        }

        async function renderMermaid() {
            const mermaidDivs = document.querySelectorAll('.mermaid');
            for (const div of mermaidDivs) {
                const code = div.textContent;
                try {
                    const { svg } = await mermaid.render(div.id + '-svg', code);
                    div.innerHTML = svg;
                } catch (e) {
                    console.error('Mermaid rendering error:', e);
                }
            }
        }

        // Fit to screen on load
        setTimeout(() => mm.fit(), 100);

        // Handle window resize
        window.addEventListener('resize', () => mm.fit());
    </script>
</body>
</html>
