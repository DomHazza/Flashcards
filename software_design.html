<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Software Design Flashcards</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 28px 16px;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Topic Picker ── */

#topic-screen h1 {
  color: #fff;
  font-size: 1.4rem;
  margin-bottom: 4px;
}

#topic-screen .subtitle {
  color: #777;
  font-size: 0.85rem;
  margin-bottom: 24px;
}

.topic-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}

.topic-btn:active { background: #252838; }

.topic-name {
  color: #e0e0e0;
  font-size: 1rem;
  font-weight: 500;
}

.topic-count {
  color: #777;
  font-size: 0.85rem;
}

/* ── Card Screen ── */

#card-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.back-btn {
  background: none;
  border: none;
  color: #a0c4ff;
  font-size: 0.95rem;
  cursor: pointer;
  padding: 6px 0;
  -webkit-tap-highlight-color: transparent;
}

.progress-text {
  color: #a0c4ff;
  font-size: 0.85rem;
  font-weight: 600;
}

.progress-bar-track {
  width: 100%;
  height: 4px;
  background: #2a2d3a;
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: #4ecdc4;
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── The Card ── */

.card-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}

.card {
  background: #fff;
  color: #1a1a1a;
  border-radius: 12px;
  padding: 28px 24px;
  min-height: 200px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  position: relative;
  overflow-y: auto;
  max-height: 65vh;
}

.card .label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
  color: #999;
}

.card.question-side .label { color: #a0c4ff; }
.card.answer-side .label { color: #4ecdc4; }

.card .card-content {
  font-size: 1.05rem;
  line-height: 1.55;
}

.card.question-side .card-content {
  font-size: 1.15rem;
  font-weight: 500;
  min-height: 80px;
}

.card .tap-hint {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 0.7rem;
  color: #bbb;
}

/* Answer markdown styling */
.card-content h1, .card-content h2, .card-content h3 {
  font-size: 1rem;
  font-weight: 700;
  margin: 12px 0 6px;
}

.card-content p { margin: 8px 0; }

.card-content ul, .card-content ol {
  margin: 8px 0 8px 20px;
}

.card-content li { margin: 4px 0; }

.card-content strong { font-weight: 700; }

.card-content table {
  border-collapse: collapse;
  width: 100%;
  margin: 10px 0;
  font-size: 0.9rem;
}

.card-content th, .card-content td {
  border: 1px solid #ddd;
  padding: 6px 10px;
  text-align: left;
}

.card-content th { background: #f0f0f0; font-weight: 600; }

.card-content code {
  background: #f4f4f4;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 0.9em;
  font-family: 'Consolas', monospace;
}

.card-content pre {
  background: #f4f4f4;
  padding: 10px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
}

.card-content pre code {
  background: none;
  padding: 0;
}

.card-content .mermaid-container {
  display: flex;
  justify-content: center;
  margin: 12px 0;
}

.card-content .mermaid-container svg {
  max-width: 100%;
  height: auto;
}

/* ── Buttons ── */

.action-buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  padding-bottom: 16px;
}

.action-btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
}

.action-btn:active { opacity: 0.8; }

.btn-again {
  background: #ff6b6b;
  color: #fff;
}

.btn-got-it {
  background: #4ecdc4;
  color: #fff;
}

.action-buttons.hidden { display: none; }

/* ── Round Complete / Done ── */

#round-screen, #done-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

#round-screen h2, #done-screen h2 {
  color: #fff;
  font-size: 1.3rem;
  margin-bottom: 8px;
}

#round-screen p, #done-screen p {
  color: #bbb;
  font-size: 0.95rem;
  margin-bottom: 24px;
}

.screen-btn {
  padding: 14px 32px;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin: 6px;
  -webkit-tap-highlight-color: transparent;
}

.screen-btn.primary {
  background: #4ecdc4;
  color: #fff;
}

.screen-btn.secondary {
  background: #2a2d3a;
  color: #e0e0e0;
}

.screen-btn:active { opacity: 0.8; }

.stat-number {
  font-size: 3rem;
  font-weight: 700;
  color: #4ecdc4;
  margin-bottom: 4px;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <!-- Topic Picker -->
  <div id="topic-screen">
    <h1>Software Design Flashcards</h1>
    <p class="subtitle">4M21 &mdash; Cambridge IIB</p>
    <div id="topic-list"></div>
  </div>

  <!-- Card Screen -->
  <div id="card-screen" class="hidden">
    <div class="top-bar">
      <button class="back-btn" id="back-btn">&larr; Topics</button>
      <span class="progress-text" id="progress-text"></span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="card-wrapper">
      <div class="card question-side" id="card">
        <div class="label" id="card-label">Question</div>
        <div class="card-content" id="card-content"></div>
        <div class="tap-hint" id="tap-hint">Tap to flip</div>
      </div>
    </div>
    <div class="action-buttons hidden" id="action-buttons">
      <button class="action-btn btn-again" id="btn-again">Again</button>
      <button class="action-btn btn-got-it" id="btn-got-it">Got it</button>
    </div>
  </div>

  <!-- Round Complete -->
  <div id="round-screen" class="hidden">
    <div class="stat-number" id="round-remaining"></div>
    <h2>Round complete</h2>
    <p id="round-message"></p>
    <button class="screen-btn primary" id="round-continue">Continue</button>
    <button class="screen-btn secondary" id="round-back">Back to topics</button>
  </div>

  <!-- All Done -->
  <div id="done-screen" class="hidden">
    <div class="stat-number">0</div>
    <h2>All cards cleared</h2>
    <p>You got every card right.</p>
    <button class="screen-btn primary" id="done-restart">Restart topic</button>
    <button class="screen-btn secondary" id="done-back">Back to topics</button>
  </div>
</div>

<script>
// ── Data ──
const DECKS = {
  "Object-Oriented Concepts": [
    {"q": "What is OOA (Object Oriented Analysis)?", "a": "Examine requirements of the system by treating it as an interacting set of objects."},
    {"q": "What is OOD (Object Oriented Design)?", "a": "Design the system as an interacting set of objects."},
    {"q": "What is OOP (Object Oriented Programming)?", "a": "Implement the system as an interacting set of objects."},
    {"q": "What is a class?", "a": "A blueprint that defines a type of thing: its data (attributes) and behaviour (methods)."},
    {"q": "What is an object?", "a": "A specific instance of a class, with its own data values."},
    {"q": "What is abstraction?", "a": "Define what something is and what it does, hiding how it does it."},
    {"q": "What is encapsulation?", "a": "Control who can access what \u2014 keep data private, expose it only through a controlled public interface (getters/setters)."},
    {"q": "What is a superclass?", "a": "The parent class whose data and behaviour are inherited."},
    {"q": "What is a subclass?", "a": "The child class that extends a superclass, inheriting all its data and behaviour, and can add or override functionality."},
    {"q": "What is inheritance?", "a": "A subclass extends a superclass, inheriting all its data and behaviour, and can add or override functionality."},
    {"q": "What is polymorphism?", "a": "The ability to call the same method on different subclasses and have each execute its own version."},
    {"q": "What is an abstract class?", "a": "A class that cannot be instantiated; it defines a blueprint with abstract methods that subclasses must implement."},
    {"q": "What is an interface (OO)?", "a": "A purely abstract class that defines only behaviour (method signatures) and no data."},
    {"q": "What is composition?", "a": "A strong \"whole\u2013part\" relationship where the part cannot exist without the whole; destroying the whole destroys the parts."},
    {"q": "What is aggregation?", "a": "A weaker \"contains\" relationship where the container does not control the lifecycle of its parts."},
    {"q": "What is association?", "a": "A general relationship between two classes, with multiplicity labels specifying how many instances participate (1, 0..*, 1..*, 0..1)."}
  ],
  "UML": [
    {"q": "What are the three sections of a UML class box?", "a": "Top = class name, middle = attributes, bottom = methods."},
    {"q": "What do + and \u2013 mean in UML visibility?", "a": "+ = public, \u2013 = private."},
    {"q": "How is an abstract class shown in UML?", "a": "Name and abstract methods written in italics. If handwriting, mark with {abstract}."},
    {"q": "How is an interface shown in UML?", "a": "Labelled <<interface>> above the class name."},
    {"q": "How is interface realisation shown in UML?", "a": "Dashed arrow with hollow triangle from implementing class to interface (or lollipop notation)."},
    {"q": "How is inheritance shown in UML?", "a": "Solid arrow with hollow triangle pointing to the superclass."},
    {"q": "How is composition shown in UML?", "a": "Solid line with filled diamond on the whole."},
    {"q": "How is aggregation shown in UML?", "a": "Solid line with empty diamond on the container."},
    {"q": "How is a unidirectional association shown in UML?", "a": "Solid line with a single arrowhead (one class knows about the other)."},
    {"q": "What is a self-association in UML?", "a": "An association line looping back to the same class (e.g. Composite pattern with * children)."},
    {"q": "How is an object shown in UML?", "a": "Instance box labelled objectName:ClassName (underlined), with attribute values shown. Lines between instances are links."},
    {"q": "What is a class diagram?", "a": "Shows the static structure \u2014 classes, attributes/methods, and relationships. Best for communicating overall architecture."},
    {"q": "What is a sequence diagram?", "a": "Shows how objects interact over time to accomplish a task. Objects along the top with vertical lifelines, horizontal arrows for method calls. Best when few objects with many calls."},
    {"q": "What is a communication diagram?", "a": "Equivalent to a sequence diagram but shows method flow by numbering calls rather than using a time axis. Best when many objects with few calls."},
    {"q": "What is a state diagram?", "a": "Captures how behaviour of a single object depends on its current state. Nodes = states, edges = events/transitions. Filled circle = initial state, bullseye = final state."},
    {"q": "What is an object diagram?", "a": "Shows a snapshot of runtime instances and links at a particular moment. Used to validate a class diagram with a concrete scenario."},
    {"q": "What are the 7 steps for designing a system in UML?", "a": "1. Identify classes (nouns)\n2. Identify methods (verbs) & attributes\n3. Choose relationships (IS A, HAS A owned, HAS A unowned, USES)\n4. Add multiplicity labels\n5. Mark abstract classes & interfaces\n6. Simplify\n7. Validate with an object diagram"},
    {"q": "How do you choose between inheritance, composition, aggregation, and association?", "a": "- IS A? \u2192 Inheritance\n- HAS A, owns lifecycle? \u2192 Composition (filled diamond)\n- HAS A, doesn't own lifecycle? \u2192 Aggregation (empty diamond)\n- Uses or knows about? \u2192 Association"}
  ],
  "Design Patterns": [
    {"q": "What problem does the Composite pattern solve?", "a": "Treat individual objects and groups uniformly in tree structures \u2014 e.g. calling draw() on a shape or a group should work the same, including groups within groups."},
    {"q": "What is the structure of the Composite pattern?", "a": "- Abstract Component defines operation()\n- Leaf implements operation() directly\n- Composite holds a list of Component children; its operation() iterates over them\n- Composite IS A Component, so composites can contain other composites \u2192 unlimited nesting"},
    {"q": "Why doesn't a group_id field work instead of Composite?", "a": "A group_id on each shape cannot support nested groups \u2014 a group of groups has no way to reference another group."},
    {"q": "What is the disadvantage of the Composite pattern?", "a": "Too flexible \u2014 can't easily enforce type rules. Also add()/remove() only make sense on Composite, not Leaf, so client code sometimes still needs type checks."},
    {"q": "What problem does the Decorator pattern solve?", "a": "Add optional features to objects at runtime without modifying the base class. With N optional features, naive subclassing needs 2^N classes."},
    {"q": "What is the structure of the Decorator pattern?", "a": "Decorator extends Component and holds a reference to a wrapped Component. Its operation() calls wrapped.operation(), then adds its own behaviour. Multiple decorators stack in any order like Russian dolls."},
    {"q": "What is the disadvantage of the Decorator pattern?", "a": "Long chains of wrappers are hard to debug. The decorator is a different object from what it wraps, so identity checks (==) can break."},
    {"q": "What problem does the Observer pattern solve?", "a": "Keep multiple objects in sync with a subject's state (e.g. multiple views of stock data), without the subject knowing about specific subscriber types."},
    {"q": "What is the structure of the Observer pattern?", "a": "Subject maintains a list of Observers with attach(), detach(), notify(). When state changes: setState() \u2192 notify() \u2192 calls update() on each observer \u2192 each observer calls getState() to read the new value."},
    {"q": "Why is directly calling each subscriber bad (vs Observer)?", "a": "It pollutes the subject with knowledge of every subscriber type. Adding a new subscriber means editing the subject."},
    {"q": "What is the disadvantage of the Observer pattern?", "a": "High computational overhead if notifications are frequent and reactions expensive. May need guards against redundant notifications."},
    {"q": "What are the three MVC components?", "a": "- Model = data and business logic (knows nothing about display)\n- View = presents data to user and captures input\n- Controller = interprets user input and calls methods on Model"},
    {"q": "What is passive mode MVC?", "a": "Controller modifies Model \u2192 Controller tells View to refresh \u2192 View calls getData() on Model."},
    {"q": "What is active mode MVC?", "a": "Controller modifies Model \u2192 Model notifies View directly using the Observer pattern (Model = Subject, View = Observer)."},
    {"q": "Which design patterns does MVC use?", "a": "- Observer in Model \u2014 notifying views of state changes (active mode)\n- Composite in View \u2014 nested UI components\n- Strategy in Controller \u2014 swappable input handling\n\nMVC is an architectural pattern built from several lower-level design patterns."}
  ],
  "Development Lifecycle & Methodologies": [
    {"q": "What are the 7 stages of the software development lifecycle?", "a": "1. Analysis\n2. Design\n3. Implementation\n4. Building\n5. Testing\n6. Deployment\n7. Maintenance"},
    {"q": "What is the analysis stage?", "a": "Discovering & describing the aspects of a software project about which there is no choice."},
    {"q": "What is the design stage?", "a": "Creating a definition of how the project goals will be achieved."},
    {"q": "What is the building stage?", "a": "Creating a complete version of the software \u2014 putting all chunks of code together."},
    {"q": "What are functional requirements?", "a": "What the system should do \u2014 features and operations, specified using natural language."},
    {"q": "What are non-functional requirements?", "a": "How the system should operate \u2014 security, usability, scalability."},
    {"q": "What are the 5 team roles in software development?", "a": "1. Architect \u2014 principal designer\n2. Project manager \u2014 schedules work, tracks progress\n3. Lead programmer \u2014 leads programming team\n4. Programmer \u2014 implements modules & tests\n5. Tester \u2014 designs tests"},
    {"q": "What are the advantages of the Waterfall model?", "a": "1. Early clarification of system goals\n2. Can charge for changes to the requirements (if a consultancy)"},
    {"q": "What are the problems with the Waterfall model?", "a": "- Very hard to specify requirements: users don't know what they want, developers don't know user preferences, requirements change over time\n- Getting the requirements wrong sabotages the entire project"},
    {"q": "What are the 4 phases of the Spiral model?", "a": "1. Planning \u2014 defining objectives and constraints\n2. Risk analysis \u2014 identify risks & build prototypes\n3. Engineering \u2014 develop and test\n4. Evaluation \u2014 review with stakeholders & plan next iteration"},
    {"q": "What is the disadvantage of the Spiral model?", "a": "Very expensive."},
    {"q": "What is the Evolutionary model?", "a": "Deliver an initial incomplete product and iteratively refine it as the requirements and stakeholder views change."},
    {"q": "What is the disadvantage of the Evolutionary model?", "a": "Can't be used if the system can't be easily partitioned into deliverable versions."},
    {"q": "What are the 4 Agile values?", "a": "1. Communication \u2014 talk to someone who knows the answer\n2. Simplicity \u2014 only solve today's problem\n3. Feedback \u2014 be satisfied with improvement\n4. Respect \u2014 value each person's contributions"},
    {"q": "What are the 5 Agile principles?", "a": "1. Economics \u2014 tangible business value\n2. Benefit \u2014 only do work that benefits people\n3. Improvement\n4. Diversity \u2014 different skills, opinions & perspectives\n5. Reflection \u2014 analyse why you succeed/fail"},
    {"q": "Name key Agile practices.", "a": "Sit together, informative workspace, energised work, pair programming, stories, 10-minute build, continuous integration, test-first programming, incremental design."},
    {"q": "What is SCRUM?", "a": "Development framework using fixed-time sprints with daily standup meetings (scrums) and scrum boards for managing priorities and tracking progress."},
    {"q": "What are the 3 SCRUM roles?", "a": "1. Product owner \u2014 voice of the customer\n2. Scrum master \u2014 facilitates the development team\n3. Development team \u2014 designing, implementing & testing"},
    {"q": "What 3 questions are discussed at a daily scrum?", "a": "1. What was done yesterday?\n2. What is planned for today?\n3. What issues can impact progress?"},
    {"q": "What is the format of a user story?", "a": "\"As a [type of user], I want to [action], so that [benefit].\""},
    {"q": "What does INVEST stand for (user stories)?", "a": "Independent, Negotiable, Valuable, Estimable, Small, Testable."},
    {"q": "What are the advantages of user stories?", "a": "- Breaks large features into small chunks\n- Provides user perspective\n- Testable"},
    {"q": "What is a use case?", "a": "A description of a user activity from start to end: goal definition, pre-conditions, criteria for successful completion, and a list of main steps."},
    {"q": "What are the 3 steps of TDD?", "a": "1. Write an automated test that defines new functionality\n2. Write code to pass the test by any means necessary\n3. Refactor the code to a good standard"},
    {"q": "What are the advantages of TDD?", "a": "1. Unit tests provide feedback that everything still works\n2. Test passes & refactoring mean the developer can move on\n3. Writing tests first gives better understanding before coding"},
    {"q": "What are the disadvantages of TDD?", "a": "1. Difficult with full functional tests\n2. Developer blindspots (same person writes tests & code)\n3. High dependence on earlier written tests"},
    {"q": "What makes a good unit test?", "a": "1. Runs fast\n2. Limited scope (test 1 thing only)\n3. Simulates any dependencies"},
    {"q": "What is continuous integration?", "a": "Integrate & test changes after no more than a few hours of work \u2014 integration must be part of each 'baby step'."},
    {"q": "What are the 3 stages of continuous delivery?", "a": "1. Commit \u2192 compile \u2192 test \u2192 create installers\n2. Longer automated acceptance tests\n3. Pipeline branches for independent deployment (UAT, capacity tests, production)"},
    {"q": "What are the advantages of continuous delivery?", "a": "- More frequent feedback from users/business\n- Release important features earlier\n- Automate repeated tasks to save time"},
    {"q": "What are the disadvantages of continuous delivery?", "a": "- More intense collaboration between departments\n- More investment in automation"}
  ],
  "Quality & Testing": [
    {"q": "What is a unit test?", "a": "Code that tests a small unit of software separately from the other units of the application."},
    {"q": "What is an integration test?", "a": "Code that tests a subsystem of code together."},
    {"q": "What are validation & verification tests?", "a": "Tests that ensure the functional requirements of the code are met."},
    {"q": "What 5 real-world performance issues should you test for?", "a": "1. Running out of memory\n2. Running out of disk space\n3. Running out of CPU bandwidth\n4. Running out of video resolution\n5. Running out of network bandwidth"},
    {"q": "What is performance/stress testing?", "a": "Testing whether the system works under extreme conditions with extra users."},
    {"q": "What is usability testing?", "a": "Testing whether the system works with real users under real conditions."},
    {"q": "What is regression testing?", "a": "Testing that bugs fixed today haven't broken other parts of the software."},
    {"q": "What is the difference between real-world and synthetic test data?", "a": "- Real-world = typical data collected from actual use\n- Synthetic = artificially generated data"},
    {"q": "What is test coverage?", "a": "The most practically possible number of test cases \u2014 all unit tests, regression tests, UI testing."},
    {"q": "Why can't automated testing fully replace manual testing?", "a": "Test cases still need to be designed by humans, and automated testing is difficult to substitute for capturing unexpected user behaviour."},
    {"q": "What is Q1 testing (tech facing, development supporting)?", "a": "Unit tests and component tests, written and maintained by developers."},
    {"q": "What is Q2 testing (business facing, development supporting)?", "a": "Acceptance tests conducted by customers to verify the system meets the acceptance criteria."},
    {"q": "What is Q3 testing (business facing, product critique)?", "a": "Explorability, usability, alpha/beta tests \u2014 checking that the application meets requirements and requirements are correct."},
    {"q": "What is Q4 testing (tech facing, product critique)?", "a": "Performance, load & security tests."},
    {"q": "What are analytics (in software quality)?", "a": "Collecting & analysing data on the product's use to increase market performance. Metrics: DAU, conversion, engagement, sales by territory."},
    {"q": "What is refactoring?", "a": "Rewriting and re-architecting software to be easier to maintain or perform better, without changing its external behaviour."},
    {"q": "What should code reviews check?", "a": "- Whether code is optimal\n- Whether code is easily understandable\n- Whether there are code smells"},
    {"q": "Give examples of code smells.", "a": "- Magic numbers or magic strings\n- Calculations in getters/setters\n- Heavy-lifting behind UI updates"},
    {"q": "What is the Five Whys technique?", "a": "Root cause analysis (originally from Toyota) \u2014 ask \"why\" repeatedly to drill past surface symptoms to the root cause."}
  ],
  "Safety": [
    {"q": "What is a hazard?", "a": "Anything that causes harm."},
    {"q": "What is risk?", "a": "The combination of the probability that a hazard leads to an accident and the likely severity of the accident if it occurs."},
    {"q": "What is a safety-critical system?", "a": "A system whose failure causes loss of life, injury, or major environmental damage."},
    {"q": "What is a mission-critical system?", "a": "A system whose failure causes a goal-directed activity to fail (e.g. banking system, power grid)."},
    {"q": "What is a business-critical system?", "a": "A system whose failure may result in the failure of the business using it (e.g. platform reliability)."},
    {"q": "What are the 5 system properties (safety context)?", "a": "1. Reliability \u2014 does it work consistently?\n2. Availability \u2014 is it always there?\n3. Safety \u2014 does it avoid harm?\n4. Security \u2014 can it be attacked?\n5. Traceability \u2014 can we explain every decision?"},
    {"q": "What are the 4 categories of failure cost?", "a": "1. Investigation cost (high if loss of life)\n2. Repair cost (high if hardware damaged)\n3. Lost revenue while system is down\n4. Extra costs \u2014 compensation, legal, reputational damage"}
  ],
  "Business": [
    {"q": "What is a startup?", "a": "A newly emerged, fast-growing business."},
    {"q": "What is innovation?", "a": "Providing systems (products/services) that change the practices of the user communities."},
    {"q": "Why does execution matter more than ideas?", "a": "Unless based on unique research, ideas are cheap \u2014 Facebook wasn't the first social network. It's execution that leads to success."},
    {"q": "What are the 4 product-market fit questions?", "a": "1. Who are the customers that need the product?\n2. Does the product solve their need?\n3. Are they willing to pay for the value?\n4. Is the business sustainable?"},
    {"q": "What is a value proposition?", "a": "Which customer problems are we helping to solve? Which customer needs are we satisfying?"},
    {"q": "What is a customer segment?", "a": "Who are we creating value for? Who are the most important customers?"},
    {"q": "What are revenue streams?", "a": "What value customers are willing to pay for, what they currently pay, and how they are paying."},
    {"q": "What are distribution channels?", "a": "Which channels customers want to be reached through and which channels are highest profit."},
    {"q": "What are customer relationships (business model)?", "a": "What relationships customers want and which relationships are highest profit."},
    {"q": "What makes up the back end of a business model?", "a": "1. Activities needed to implement the model\n2. Resources \u2014 physical, intellectual, human\n3. Partners needed & why they are interested\n4. Cost structure resulting from the model"},
    {"q": "What does 'moving fast' in software engineering require beyond agile?", "a": "Review, testing, release, monitoring, learning."}
  ]
};

let currentTopic = '';
let totalCards = 0;
let clearedCards = 0;
let pile = [];
let again = [];
let cardIndex = 0;
let flipped = false;

// ── DOM refs ──
const topicScreen   = document.getElementById('topic-screen');
const cardScreen    = document.getElementById('card-screen');
const roundScreen   = document.getElementById('round-screen');
const doneScreen    = document.getElementById('done-screen');
const topicList     = document.getElementById('topic-list');
const card          = document.getElementById('card');
const cardLabel     = document.getElementById('card-label');
const cardContent   = document.getElementById('card-content');
const tapHint       = document.getElementById('tap-hint');
const actionButtons = document.getElementById('action-buttons');
const progressText  = document.getElementById('progress-text');
const progressBar   = document.getElementById('progress-bar');

// ── Init ──
try { mermaid.initialize({ startOnLoad: false, theme: 'default' }); } catch(e) {}

function init() {
  topicList.innerHTML = '';
  const names = Object.keys(DECKS);
  names.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.innerHTML = `<span class="topic-name">${esc(name)}</span><span class="topic-count">${DECKS[name].length} cards</span>`;
    btn.addEventListener('click', () => startTopic(name));
    topicList.appendChild(btn);
  });
}

// ── Navigation ──
function showScreen(screen) {
  [topicScreen, cardScreen, roundScreen, doneScreen].forEach(s => s.classList.add('hidden'));
  screen.classList.remove('hidden');
}

function startTopic(name) {
  currentTopic = name;
  totalCards = DECKS[name].length;
  clearedCards = 0;
  pile = shuffle([...DECKS[name]]);
  again = [];
  cardIndex = 0;
  showScreen(cardScreen);
  showCard();
}

function goToTopics() {
  showScreen(topicScreen);
}

// ── Card Display ──
function showCard() {
  if (cardIndex >= pile.length) {
    endRound();
    return;
  }
  flipped = false;
  const c = pile[cardIndex];
  card.className = 'card question-side';
  cardLabel.textContent = 'Question';
  cardContent.innerHTML = esc(c.q);
  tapHint.textContent = 'Tap or press Space to flip';
  actionButtons.classList.add('hidden');
  updateProgress();
  card.scrollTop = 0;

  // Render KaTeX on question side
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(cardContent, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }
}

// Shield LaTeX from marked: extract $...$ and $$...$$ blocks, run marked
// on the rest, then restore the LaTeX so KaTeX can render it cleanly.
function renderMarkdownWithLatex(src) {
  const placeholders = [];
  // Replace display math first ($$...$$), then inline ($...$)
  let shielded = src.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
    placeholders.push(m);
    return '%%MATH' + (placeholders.length - 1) + '%%';
  });
  shielded = shielded.replace(/\$([^\n$]+?)\$/g, (m) => {
    placeholders.push(m);
    return '%%MATH' + (placeholders.length - 1) + '%%';
  });

  let html = (typeof marked !== 'undefined' && marked.parse)
    ? marked.parse(shielded)
    : shielded.replace(/\n/g, '<br>');

  // Restore LaTeX
  for (let i = 0; i < placeholders.length; i++) {
    html = html.replace('%%MATH' + i + '%%', placeholders[i]);
  }
  return html;
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  const c = pile[cardIndex];
  card.className = 'card answer-side';
  cardLabel.textContent = 'Answer';
  tapHint.textContent = '';

  cardContent.innerHTML = renderMarkdownWithLatex(c.a);

  // Render KaTeX
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(cardContent, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }

  // Render Mermaid
  if (typeof mermaid !== 'undefined' && mermaid.render) {
    const codeBlocks = cardContent.querySelectorAll('code.language-mermaid');
    codeBlocks.forEach((block, i) => {
      const pre = block.parentElement;
      const container = document.createElement('div');
      container.className = 'mermaid-container';
      const id = 'mermaid-' + Date.now() + '-' + i;
      try {
        mermaid.render(id, block.textContent.trim()).then(({ svg }) => {
          container.innerHTML = svg;
          pre.replaceWith(container);
        }).catch(() => {});
      } catch(e) {}
    });
  }

  actionButtons.classList.remove('hidden');
  card.scrollTop = 0;
}

function markGotIt() {
  clearedCards++;
  cardIndex++;
  showCard();
}

function markAgain() {
  again.push(pile[cardIndex]);
  cardIndex++;
  showCard();
}

function endRound() {
  if (again.length === 0) {
    showScreen(doneScreen);
  } else {
    document.getElementById('round-remaining').textContent = again.length;
    document.getElementById('round-message').textContent =
      again.length + ' card' + (again.length === 1 ? '' : 's') + ' to review. ' + clearedCards + ' of ' + totalCards + ' cleared.';
    showScreen(roundScreen);
  }
}

function nextRound() {
  pile = shuffle([...again]);
  again = [];
  cardIndex = 0;
  showScreen(cardScreen);
  showCard();
}

function restartTopic() {
  startTopic(currentTopic);
}

// ── Progress ──
function updateProgress() {
  progressText.textContent = clearedCards + ' of ' + totalCards + ' cleared';
  const pct = totalCards > 0 ? (clearedCards / totalCards) * 100 : 0;
  progressBar.style.width = pct + '%';
}

// ── Utilities ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Event Listeners ──
card.addEventListener('click', flipCard);
document.getElementById('btn-got-it').addEventListener('click', markGotIt);
document.getElementById('btn-again').addEventListener('click', markAgain);
document.getElementById('back-btn').addEventListener('click', goToTopics);
document.getElementById('round-continue').addEventListener('click', nextRound);
document.getElementById('round-back').addEventListener('click', goToTopics);
document.getElementById('done-restart').addEventListener('click', restartTopic);
document.getElementById('done-back').addEventListener('click', goToTopics);

document.addEventListener('keydown', (e) => {
  if (cardScreen.classList.contains('hidden')) return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!flipped) flipCard();
  } else if (e.code === 'ArrowLeft' && flipped) {
    e.preventDefault();
    markAgain();
  } else if (e.code === 'ArrowRight' && flipped) {
    e.preventDefault();
    markGotIt();
  }
});

// ── Start ──
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
