<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIB Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e0e0e0;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 24px 16px;
}

h1 {
  color: #fff;
  font-size: 1.5rem;
  margin-bottom: 4px;
}

.subtitle {
  color: #777;
  font-size: 0.85rem;
  margin-bottom: 28px;
}

.subject-header {
  color: #a0c4ff;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 24px 0 10px;
  padding-left: 4px;
}

.subject-header:first-of-type {
  margin-top: 8px;
}

a.card-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  background: #1a1d27;
  border: 1px solid #2a2d3a;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 10px;
  text-decoration: none;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

a.card-link:active { background: #252838; }

a.card-link .name {
  color: #e0e0e0;
  font-size: 1rem;
  font-weight: 500;
}

a.card-link .arrow {
  color: #a0c4ff;
  font-size: 1.1rem;
}
</style>
</head>
<body>
<div class="container">
  <h1>IIB Flashcards</h1>
  <p class="subtitle">Cambridge Engineering — Exam Revision</p>

  <h2 class="subject-header">4M21 Software Engineering & Design</h2>
  <a class="card-link" href="hci.html">
    <span class="name">HCI</span>
    <span class="arrow">&rarr;</span>
  </a>
  <a class="card-link" href="software_design.html">
    <span class="name">Software Design</span>
    <span class="arrow">&rarr;</span>
  </a>
</div>
</body>
</html>
